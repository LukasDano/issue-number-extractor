<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue number extractor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #output {
            min-height: 200px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h2>Process text with #numbers</h2>

    <label>Input:</label>
    <textarea id="input" placeholder="Enter text here..."></textarea>

    <button onclick="verarbeiten()">Extract & Sort</button>

    <h3>Parsed:</h3>
    <textarea id="output" readonly></textarea>

    <script>
        function verarbeiten() {
            const text = document.getElementById('input').value;

            // Findet #123, #42 usw.
            const matches = text.match(/#\d+/g) || [];

            // Nummern extrahieren und sortieren
            const sortiert = matches
                .map(item => ({
                    original: item,
                    nummer: parseInt(item.substring(1), 10)
                }))
                .sort((a, b) => a.nummer - b.nummer);

            // Ausgabe erzeugen
            const ausgabe = sortiert
                .map(item => `- [ ] ${item.original}`)
                .join('\n');

            document.getElementById('output').value = ausgabe;
        }
    </script>

</body>
</html>
