<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue number extractor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #output {
            min-height: 200px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h2>Process text with #numbers</h2>

    <label>Input:</label>
    <textarea id="input" placeholder="Enter text here..."></textarea>

    <button onclick="process()">Extract & Sort</button>

    <h3>Parsed:</h3>
    <textarea id="output" readonly></textarea>

    <script>
        function process() {
            const text = document.getElementById('input').value;

            const matches = text.match(/#\d+/g) || [];

            const output = [...new Set(matches)]
                .sort((a, b) => Number(a.slice(1)) - Number(b.slice(1)))
                .map(item => `- [ ] ${item}`)
                .join('\n');

            document.getElementById('output').value = output;
        }
    </script>

</body>
</html>
